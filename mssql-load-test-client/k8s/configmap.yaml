apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-load-test-config
  namespace: demo
  labels:
    app: ms-load-test
data:
  # Test Duration (in seconds)
  TEST_RUN_DURATION: "200"

  # Concurrency Settings
  CONCURRENT_WRITERS: "20"

  # Workload Distribution (must sum to 100)
  READ_PERCENT: "80"
  INSERT_PERCENT: "10"
  UPDATE_PERCENT: "10"

  # Batch Sizes
  BATCH_SIZE: "100"
  READ_BATCH_SIZE: "100"

  # Database Settings
  TABLE_NAME: "load_test_data"

  # Connection Pool Settings
  MAX_OPEN_CONNS: "60"
  MAX_IDLE_CONNS: "10"
  CONN_MAX_LIFETIME: "300"

  # Connection Safety
  MIN_FREE_CONNS: "5"

  # Reporting
  REPORT_INTERVAL: "20"

  # Cleanup: set to "true" to keep the table after the test for manual inspection
  # Default is "false" (table is dropped at the end)
  SKIP_CLEANUP: "true"
