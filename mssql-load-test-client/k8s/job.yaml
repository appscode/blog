# k8s/03-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ms-load-test-job
  namespace: demo
  labels:
    app: ms-load-test
    version: v2
spec:
  completions: 1
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: ms-load-test
        version: v2
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: load-test
          image: neajmorshad/mssql-load-test:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          envFrom:
            - configMapRef:
                name: ms-load-test-config
            - secretRef:
                name: ms-load-test-secret
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: ms-load-test-results